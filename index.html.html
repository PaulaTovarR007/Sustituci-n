<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Integración por Sustitución 💖</title>

<script src="https://cdn.jsdelivr.net/npm/algebrite/dist/algebrite.bundle-for-browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#09090f;
    font-family:Arial, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#111827;
    padding:35px;
    border-radius:25px;
    width:700px;
    box-shadow:
    0 0 25px rgba(236,72,153,.35),
    0 0 50px rgba(168,85,247,.25);
    margin-top: 40px;
}

h1{
    text-align:center;
    font-size:35px;
    margin-bottom:30px;
    color:#ff71c6;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#1f2937;
    color:white;
    font-size:18px;
    margin-top:20px;
    outline:none;
}

input::placeholder{
    color:#9ca3af;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:15px;
    background:linear-gradient(to right,#ec4899,#8b5cf6);
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.02);
}

.resultado{
    margin-top:20px;
    background:#0f172a;
    padding:20px;
    border-radius:15px;
    line-height:2;
    word-wrap:break-word;
}

.procedimiento{
    margin-top:20px;
    background:#111827;
    padding:20px;
    border-radius:15px;
    border-left:5px solid #d946ef;
}

/* Encabezados superiores profesionales */
.meta-info-izq {
    position:absolute;
    top:20px;
    left:20px;
    font-size:16px;
    font-weight:bold;
    color:#c084fc;
    letter-spacing: 1px;
}

.firma{
    position:absolute;
    top:20px;
    right:20px;
    font-size:16px;
    font-weight:bold;
    color:#ff71c6;
}

.titulo-rosa{
    color:#f472b6;
    font-weight:bold;
}

.titulo-morado{
    color:#c084fc;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- Sección de información escolar y créditos -->
<div class="meta-info-izq">
    6B Cálculo Integral 📐
</div>

<div class="firma">
    Paula Tovar 💖
</div>

<div class="container">
    <h1>Integración por Sustitución 💖</h1>

    <input
        type="text"
        id="funcion"
        placeholder="Ejemplo: 2*x*cos(x^2)"
    >

    <button onclick="resolver()">
        Resolver ✨
    </button>

    <div class="resultado" id="resultado">
        Esperando función...
    </div>
</div>

<script>
function resolver(){
    let funcion = document.getElementById("funcion").value.replace(/\s/g,'');
    let resultadoDiv = document.getElementById("resultado");

    try{
        let resultado = Algebrite.integral(funcion).toString();
        let pasos = "";

        // Casos específicos con respuestas "hardcoded" estéticas y detalladas
        if(funcion == "2*x*cos(x^2)" || funcion == "2x*cos(x^2)" || funcion == "cos(x^2)*2*x"){
            pasos = `
            <div class="titulo-morado">Elección de variables:</div>
            u = x²<br>
            du = 2x dx<br><br>
            <span class="titulo-rosa">Sustitución en la integral:</span><br>
            ∫ 2x cos(x²) dx  ➜  ∫ cos(u) du<br><br>
            <span class="titulo-rosa">Integración:</span><br>
            = sin(u)<br><br>
            <span class="titulo-rosa">Regresando a la variable original (x):</span><br>
            = sin(x²)
            `;
        }
        else if(funcion == "x*(x^2+1)^3" || funcion == "x*(x^2+1)^3"){
            pasos = `
            <div class="titulo-morado">Elección de variables:</div>
            u = x² + 1<br>
            du = 2x dx  ➜  du/2 = x dx<br><br>
            <span class="titulo-rosa">Sustitución en la integral:</span><br>
            ∫ x(x²+1)³ dx  ➜  ∫ u³ (du/2) = (1/2) ∫ u³ du<br><br>
            <span class="titulo-rosa">Integración:</span><br>
            = (1/2) * (u⁴ / 4)<br>
            = u⁴ / 8<br><br>
            <span class="titulo-rosa">Regresando a la variable original (x):</span><br>
            = ((x² + 1)⁴) / 8
            `;
        }
        else if(funcion == "e^(3*x)" || funcion == "e^(3x)"){
            pasos = `
            <div class="titulo-morado">Elección de variables:</div>
            u = 3x<br>
            du = 3 dx  ➜  du/3 = dx<br><br>
            <span class="titulo-rosa">Sustitución en la integral:</span><br>
            ∫ e^(3x) dx  ➜  ∫ e^u (du/3) = (1/3) ∫ e^u du<br><br>
            <span class="titulo-rosa">Integración:</span><br>
            = (1/3) e^u<br><br>
            <span class="titulo-rosa">Regresando a la variable original (x):</span><br>
            = (1/3) e^(3x)
            `;
        }
        // Fallback dinámico general para cualquier otra función
        else{
            pasos = `
            1. Se identifica la función interna conveniente para el cambio.<br><br>
            2. Se define la nueva variable:<br>
            &nbsp;&nbsp;&nbsp;&nbsp;<b>u</b> = expresión interna<br><br>
            3. Se calcula el diferencial aplicando derivadas:<br>
            &nbsp;&nbsp;&nbsp;&nbsp;<b>du</b> = u' dx<br><br>
            4. Se realiza el cambio de variable y se ejecuta la integración algebraica.<br><br>
            5. Se restituyen los valores originales en términos de x.
            `;
        }

        resultadoDiv.innerHTML = `
        <div class="titulo-rosa">Integral a resolver:</div>
        | ${funcion} dx<br><br>
        
        <div class="titulo-morado">Resultado Directo:</div>
        ${resultado}

        <div class="procedimiento">
            <div class="titulo-rosa">Procedimiento paso a paso:</div><br>
            ${pasos}<br><br>
            <div class="titulo-morado">Resultado final:</div><br>
            ${resultado} + C
        </div>
        `;

    }catch(error){
        resultadoDiv.innerHTML = `
        <span style="color:#fb7185;">
            ❌ Error al procesar la expresión matemática. Revisa la sintaxis.
        </span>
        `;
    }
}
</script>
</body>
</html>
